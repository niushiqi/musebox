<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量重命名注释打标 - MuseAI</title>
    <link rel="stylesheet" href="js/ui.css">
</head>
<body>
    <div class="container">
        <!-- 标签页导航 -->
        <div class="tabs">
            <div class="tab active" data-tab="dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                工作台
            </div>
            <div class="tab" data-tab="templates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                模板管理
            </div>
            <div class="tab" data-tab="settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m5.2-13.2l-4.2 4.2m0 6l4.2 4.2M23 12h-6m-6 0H1m18.2 5.2l-4.2-4.2m0-6l4.2-4.2"></path>
                </svg>
                设置
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 工作台页面 -->
            <div id="dashboard" class="tab-content active">
                <!-- 控制面板 -->
                <div class="control-panel">
                    <!-- 注释控制 -->
                    <div class="control-row active" data-feature="annotation">
                        <div class="control-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <div class="control-info">
                            <div class="control-title">生成注释</div>
                            <div class="control-desc">使用 AI 描述图片内容</div>
                        </div>
                        <div class="control-actions">
                            <select class="form-select" id="annotation-template">
                                <option value="default">默认模板</option>
                            </select>
                            <button class="btn-icon" title="预览模板" onclick="previewTemplate('annotation')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <label class="toggle">
                                <input type="checkbox" checked id="enable-annotation">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- 标签控制 -->
                    <div class="control-row active" data-feature="tag">
                        <div class="control-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                <line x1="7" y1="7" x2="7.01" y2="7"></line>
                            </svg>
                        </div>
                        <div class="control-info">
                            <div class="control-title">生成标签</div>
                            <div class="control-desc">自动生成相关标签</div>
                        </div>
                        <div class="control-actions">
                            <select class="form-select" id="tag-template">
                                <option value="default">默认模板</option>
                            </select>
                            <button class="btn-icon" title="预览模板" onclick="previewTemplate('tag')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <label class="toggle">
                                <input type="checkbox" checked id="enable-tag">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- 重命名控制 -->
                    <div class="control-row" data-feature="rename">
                        <div class="control-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                            </svg>
                        </div>
                        <div class="control-info">
                            <div class="control-title">重命名</div>
                            <div class="control-desc">根据内容重命名文件</div>
                        </div>
                        <div class="control-actions">
                            <select class="form-select" id="rename-template">
                                <option value="default">默认模板</option>
                            </select>
                            <button class="btn-icon" title="预览模板" onclick="previewTemplate('rename')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <label class="toggle">
                                <input type="checkbox" id="enable-rename">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- 开始按钮 -->
                    <button class="btn btn-primary" id="startBtn" onclick="handleStartProcessing()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        开始处理
                    </button>

                    <!-- 进度条 -->
                    <div class="progress-section" id="progressSection" style="display: none;">
                        <div class="progress-text">
                            <span id="progressText">正在处理 0 / 0</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>

                <!-- 自动模式 -->
                <div class="auto-mode">
                    <div class="auto-mode-info">
                        <div class="auto-mode-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                        </div>
                        <div>
                            <div class="auto-mode-title">自动处理新图片</div>
                            <div class="auto-mode-desc">当有新图片拖入 Eagle 时自动运行</div>
                        </div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="autoModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- 预览队列 -->
                <div class="preview-section">
                    <div class="preview-header">
                        <h3>预览队列 (<span id="imageCount">0</span>)</h3>
                        <div class="pagination">
                            <button class="btn-icon" id="prevPage">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <span id="pageInfo">1 / 1</span>
                            <button class="btn-icon" id="nextPage">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="image-grid" id="imageGrid">
                        <!-- 图片项将动态添加 -->
                    </div>
                </div>
            </div>

            <!-- 模板管理页面 -->
            <div id="templates" class="tab-content">
                <div class="page-header">
                    <h2>模板管理</h2>
                    <p class="page-desc">创建和管理您的 AI 提示词模板</p>
                </div>
                <div class="template-placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <p>模板管理功能即将推出</p>
                    <p class="template-hint">您可以在设置中自定义提示词</p>
                </div>
            </div>

            <!-- 设置页面 -->
            <div id="settings" class="tab-content">
                <div class="page-header">
                    <h2>设置</h2>
                    <p class="page-desc">配置 AI 服务和处理偏好</p>
                </div>

                <!-- API 配置 -->
                <div class="settings-section">
                    <h3 class="section-title">AI 服务配置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">服务商</label>
                        <select class="form-input" id="provider" onchange="handleProviderChange()">
                            <option value="volcano">火山方舟</option>
                            <option value="alibaba">阿里云百炼</option>
                            <option value="google">Google AI Studio</option>
                            <option value="zhipu">智谱AI</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="password" class="form-input" id="apiKey" placeholder="请输入 API Key">
                    </div>

                    <div class="form-group">
                        <label class="form-label">模型</label>
                        <select class="form-input" id="model">
                            <!-- 动态填充 -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">最大 Token 数</label>
                        <input type="number" class="form-input" id="maxTokens" value="200" min="50" max="4000">
                    </div>

                    <button class="btn btn-secondary" onclick="testAPIConnection()">测试连接</button>
                </div>

                <!-- 处理偏好 -->
                <div class="settings-section">
                    <h3 class="section-title">处理偏好</h3>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-title">跳过已有注释的图片</div>
                            <div class="setting-desc">如果图片已有注释,则跳过处理</div>
                        </div>
                        <label class="toggle">
                            <input type="checkbox" id="skipExisting" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-title">跳过已处理的图片</div>
                            <div class="setting-desc">记住已处理的图片,避免重复处理</div>
                        </div>
                        <label class="toggle">
                            <input type="checkbox" id="skipProcessed" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Token 统计 -->
                <div class="settings-section">
                    <h3 class="section-title">使用统计</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="input-tokens">0</div>
                            <div class="stat-label">输入 Token</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="output-tokens">0</div>
                            <div class="stat-label">输出 Token</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="processed-count">0</div>
                            <div class="stat-label">已处理图片</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="requests-count">0</div>
                            <div class="stat-label">API 请求</div>
                        </div>
                    </div>
                </div>

                <!-- 保存按钮 -->
                <div class="settings-actions">
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                    <button class="btn btn-secondary" onclick="resetSettings()">重置为默认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知容器 -->
    <div id="notifications"></div>

    <!-- 引入脚本 -->
    <script src="js/plugin.js"></script>
    <script src="js/ui-manager.js"></script>
</body>
</html>
